name: CI/CD Pipeline — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  SOLUTION: CryptoTrading.slnx

jobs:
  # ──────────────────────────────────────────────
  #  Job 1: Full Build + Test on ubuntu-latest
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET info
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (warnings → errors enforced)
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c ${{ env.CONFIGURATION }}

      - name: Run unit tests
        run: dotnet test tests/UnitTests/CryptoTrading.UnitTests.csproj --no-build -c ${{ env.CONFIGURATION }} --verbosity normal
