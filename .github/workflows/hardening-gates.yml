name: Hardening Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_playwright:
        description: 'Run opt-in Playwright dashboard smoke test'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_native_aot:
        description: 'Run opt-in Native AOT publish validation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      native_aot_rid:
        description: 'Runtime identifier for Native AOT validation'
        required: false
        default: 'linux-x64'

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  CONFIGURATION: Release

jobs:
  hardening:
    name: Tests, Dashboard and Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Run unit tests
        run: dotnet test tests/UnitTests/CryptoTrading.UnitTests.csproj -c ${{ env.CONFIGURATION }} --verbosity normal

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Install Playwright browser
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_playwright == 'true' }}
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright dashboard smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_playwright == 'true' }}
        working-directory: dashboard
        run: npm run test:e2e

      - name: Run adaptive benchmark smoke
        run: dotnet run -c ${{ env.CONFIGURATION }} --project tools/benchmarks/CryptoTrading.Benchmarks -- --filter '*Adaptive*' --iterations 3

      - name: Run indicator benchmark smoke
        run: dotnet run -c ${{ env.CONFIGURATION }} --project tools/benchmarks/CryptoTrading.Benchmarks -- --filter '*Indicator*' --iterations 2

      - name: Run Native AOT validation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_native_aot == 'true' }}
        run: bash tools/validate-native-aot.sh '${{ inputs.native_aot_rid }}'
