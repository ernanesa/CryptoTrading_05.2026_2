name: Opt-in Hardening Gates

on:
  workflow_dispatch:
    inputs:
      run_playwright:
        description: 'Run opt-in Playwright dashboard smoke test'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_integration_tests:
        description: 'Run opt-in Testcontainers PostgreSQL integration tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_featurestore_benchmark:
        description: 'Run opt-in FeatureStore PostgreSQL benchmark'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_native_aot:
        description: 'Run opt-in Native AOT publish validation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      native_aot_rid:
        description: 'Runtime identifier for Native AOT validation'
        required: false
        default: 'linux-x64'

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  CONFIGURATION: Release

jobs:
  opt-in-gates:
    name: Opt-in Tests, Dashboard and Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: ${{ inputs.run_playwright == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Run PostgreSQL integration tests
        if: ${{ inputs.run_integration_tests == 'true' }}
        run: dotnet test tests/IntegrationTests/CryptoTrading.IntegrationTests.csproj -c ${{ env.CONFIGURATION }} --verbosity normal

      - name: Install dashboard dependencies
        if: ${{ inputs.run_playwright == 'true' }}
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browser
        if: ${{ inputs.run_playwright == 'true' }}
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright dashboard smoke
        if: ${{ inputs.run_playwright == 'true' }}
        working-directory: dashboard
        run: npm run test:e2e

      - name: Run FeatureStore PostgreSQL benchmark
        if: ${{ inputs.run_featurestore_benchmark == 'true' }}
        run: dotnet run -c ${{ env.CONFIGURATION }} --project tools/benchmarks/CryptoTrading.Benchmarks -- --filter '*FeatureStore*' --iterations 3

      - name: Run Native AOT validation
        if: ${{ inputs.run_native_aot == 'true' }}
        run: bash tools/validate-native-aot.sh '${{ inputs.native_aot_rid }}'
